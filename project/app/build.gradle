plugins {
    id 'com.android.application'
    id 'com.didi.dokit'
}

android {
    compileSdkVersion project.compileSdkVersion

    defaultConfig {
        applicationId "tech.sud.mgp.hello"
        minSdkVersion project.minSdkVersion
        targetSdkVersion project.targetSdkVersion
        versionCode Integer.parseInt(project.versionCode)
        versionName project.versionName
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        applicationVariants.all { variant ->
            variant.outputs.all {
                def temNewFileName = "${variant.flavorName}-${project.baseUrlConfig}-${project.versionName}-${project.versionCode}-${variant.buildType.name}"
                // дҝ®ж”№apkеҗҚеӯ—
                outputFileName = "HelloSud-Android-" + temNewFileName + ".apk"
            }
        }
    }

    signingConfigs {
        release {
            if (project.hasProperty("jksPropertyPath") && project.jksPropertyPath != "") {
                // releaseи®ҫзҪ®еҸ‘еёғзӯҫеҗҚи·Ҝеҫ„
                Properties properties = new Properties()
                properties.load(new FileInputStream(file(project.jksPropertyPath)))
                storeFile file(properties['STORE_FILE'])
                storePassword properties['STORE_PWD']
                keyAlias properties['KEY_ALIAS']
                keyPassword properties['KEY_PWD']
            } else {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            }
        }
        debug {
            storeFile file(RELEASE_STORE_FILE)
            storePassword RELEASE_STORE_PASSWORD
            keyAlias RELEASE_KEY_ALIAS
            keyPassword RELEASE_KEY_PASSWORD
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    ndkVersion '21.4.7075529'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    sourceSets {
        main {
            jniLibs.srcDirs = ['libs/zego', 'libs/agora', 'libs/netease', 'libs/volc', 'libs/tx']
        }
    }
    flavorDimensions 'channel'
    productFlavors {
        official {
            String channel = "official"
            buildConfigField("String", "CHANNEL", "\"" + channel + "\"")
            buildConfigField("String", "baseUrl", "\"" + project.baseUrl + "\"")
            buildConfigField("String", "interactBaseUrl", "\"" + project.interactBaseUrl + "\"")
            buildConfigField("String", "gameBaseUrl", "\"" + project.gameBaseUrl + "\"")
            buildConfigField("String", "buglyAppId", "\"" + project.buglyAppId + "\"")
            buildConfigField("boolean", "gameIsTestEnv", project.gameIsTestEnv)
        }
    }
}

dokitExt {
    //йҖҡз”Ёи®ҫзҪ®
    comm {
        //ең°еӣҫз»Ҹзә¬еәҰејҖе…і
        gpsSwitch true
        //зҪ‘з»ңејҖе…і
        networkSwitch true
        //еӨ§еӣҫејҖе…і
        bigImgSwitch true
        //webView js жҠ“еҢ…
        webViewSwitch true
    }

    slowMethod {
        //и°ғз”Ёж ҲжЁЎејҸй…ҚзҪ® еҜ№еә”gradle.propertiesдёӯDOKIT_METHOD_STRATEGY=0
        stackMethod {
            //й»ҳи®ӨеҖјдёә 5ms е°ҸдәҺиҜҘеҖјзҡ„еҮҪж•°еңЁи°ғз”Ёж ҲдёӯдёҚжҳҫзӨә
            thresholdTime 10
            //и°ғз”Ёж ҲеҮҪж•°е…ҘеҸЈ еҚғдёҮдёҚиҰҒз”ЁжҲ‘й»ҳи®Өзҡ„й…ҚзҪ® еҰӮжһңжңүзү№ж®ҠйңҖжұӮдҝ®ж”№жҲҗйЎ№зӣ®дёӯиҮӘе·ұзҡ„е…ҘеҸЈ еҒҮеҰӮдёҚйңҖиҰҒеҸҜд»ҘеҺ»жҺүиҜҘеӯ—ж®ө
//            enterMethods = ["com.didichuxing.doraemondemo.MainDebugActivity.test1"]
            //й»‘еҗҚеҚ• зІ’еәҰжңҖе°ҸеҲ°зұ» жҡӮдёҚж”ҜжҢҒеҲ°ж–№жі•  еҚғдёҮдёҚиҰҒз”ЁжҲ‘й»ҳи®Өзҡ„й…ҚзҪ® еҰӮжһңжңүзү№ж®ҠйңҖжұӮдҝ®ж”№жҲҗйЎ№зӣ®дёӯиҮӘе·ұзҡ„е…ҘеҸЈ еҒҮеҰӮдёҚйңҖиҰҒеҸҜд»ҘеҺ»жҺүиҜҘеӯ—ж®ө
//            methodBlacklist = ["com.facebook.drawee.backends.pipeline.Fresco"]
        }
        //жҷ®йҖҡжЁЎејҸй…ҚзҪ® еҜ№еә”gradle.propertiesдёӯDOKIT_METHOD_STRATEGY=1
        normalMethod {
            //й»ҳи®ӨеҖјдёә 500ms е°ҸдәҺиҜҘеҖјзҡ„еҮҪж•°еңЁиҝҗиЎҢж—¶дёҚдјҡеңЁжҺ§еҲ¶еҸ°дёӯиў«жү“еҚ°
            thresholdTime 500
            //йңҖиҰҒй’ҲеҜ№еҮҪж•°жҸ’иЈ…зҡ„еҢ…еҗҚ еҚғдёҮдёҚиҰҒз”ЁжҲ‘й»ҳи®Өзҡ„й…ҚзҪ® еҰӮжһңжңүзү№ж®ҠйңҖжұӮдҝ®ж”№жҲҗйЎ№зӣ®дёӯиҮӘе·ұзҡ„йЎ№зӣ®еҢ…еҗҚ еҒҮеҰӮдёҚйңҖиҰҒеҸҜд»ҘеҺ»жҺүиҜҘеӯ—ж®ө
//            packageNames = ["com.didichuxing.doraemondemo"]
            //дёҚйңҖиҰҒй’ҲеҜ№еҮҪж•°жҸ’иЈ…зҡ„еҢ…еҗҚ&зұ»еҗҚ еҚғдёҮдёҚиҰҒз”ЁжҲ‘й»ҳи®Өзҡ„й…ҚзҪ® еҰӮжһңжңүзү№ж®ҠйңҖжұӮдҝ®ж”№жҲҗйЎ№зӣ®дёӯиҮӘе·ұзҡ„йЎ№зӣ®еҢ…еҗҚ еҒҮеҰӮдёҚйңҖиҰҒеҸҜд»ҘеҺ»жҺүиҜҘеӯ—ж®ө
//            methodBlacklist = ["com.didichuxing.doraemondemo.dokit"]
        }
    }
}

dependencies {

    implementation fileTree(include: ['*.jar', "*.aar", '*.so'], dir: 'libs/zego')
    implementation fileTree(include: ['*.jar', "*.aar", '*.so'], dir: 'libs/agora')
    implementation fileTree(include: ['*.jar', "*.aar", '*.so'], dir: 'libs/netease')
    implementation fileTree(include: ['*.jar', "*.aar", '*.so'], dir: 'libs/volc')
    implementation fileTree(include: ['*.jar', "*.aar", '*.so'], dir: 'libs/tx')
    implementation "androidx.appcompat:appcompat:${project.appcompatVersion}"
    implementation "com.google.android.material:material:${project.materialVersion}"
    implementation "androidx.constraintlayout:constraintlayout:${constraintlayoutVersion}"
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'

    // еј•е…Ҙ SudMGPWrapper
    implementation project(':SudMGPWrapper')

    // еұҸе№•йҖӮй…Қпјҡhttps://github.com/JessYanCoding/AndroidAutoSize
    implementation 'com.github.JessYanCoding:AndroidAutoSize:v1.2.1'

    // и…ҫи®ҜbuglyеҘ”жәғз»ҹи®Ў
    implementation 'com.tencent.bugly:crashreport:4.0.0'

    // дҫқиө–okhttp
    implementation 'com.squareup.okhttp3:okhttp:4.9.2'

    // еӣҫзүҮеҠ иҪҪеә“
    implementation 'com.github.bumptech.glide:glide:4.12.0'

    // зҪ‘з»ңиҜ·жұӮеә“
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.4.0'
    implementation 'com.squareup.retrofit2:adapter-rxjava3:2.9.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.9.1'
    implementation 'com.trello.rxlifecycle4:rxlifecycle:4.0.2'
    implementation 'com.trello.rxlifecycle4:rxlifecycle-components:4.0.2'

    // RecyclerViewзҡ„Adapter: https://github.com/CymChad/BaseRecyclerViewAdapterHelper
    implementation 'com.github.CymChad:BaseRecyclerViewAdapterHelper:3.0.7'

    // recyclerview
    api 'androidx.recyclerview:recyclerview:1.2.1'

    // еўһеҠ mp4 sdk
    implementation 'com.github.bytedance:AlphaPlayer:1.2.0'
    implementation 'com.google.android.exoplayer:exoplayer-core:2.9.6'
    // Android svga https://github.com/svga/SVGAPlayer-Android
    implementation 'com.github.yyued:SVGAPlayer-Android:2.6.1'
    // ж’ӯж”ҫjsonеҠЁз”»зҡ„еә“пјҢзҪ‘еқҖдёәпјҡhttps://github.com/airbnb/lottie-android
    implementation "com.airbnb.android:lottie:3.7.0"
    // Glideж”ҜжҢҒwebpеҠЁеӣҫзҡ„еә“
    implementation "com.github.zjupure:webpdecoder:2.0.4.12.0"

    // жІүжөёејҸзҠ¶жҖҒж Ҹ
    implementation 'com.geyifeng.immersionbar:immersionbar:3.2.2'

    // дәӢд»¶йҖҡзҹҘ
    implementation 'io.github.jeremyliao:live-event-bus:1.8.0'

    // RongCloud IM
    implementation 'cn.rongcloud.sdk:im_lib:5.2.0'
    // RongCloud IM
    implementation 'cn.rongcloud.sdk:rtc_lib:5.2.0'
    // RongCloud IM иҜӯиҒҠжҲҝ
    implementation 'cn.rongcloud.sdk:voiceroom_lib:2.0.8'
    implementation "com.github.hackware1993:MagicIndicator:1.7.0"

    // и®ҫзҪ®йҳҙеҪұйўңиүІзҡ„жҺ§д»¶
    implementation 'com.github.lihangleo2:ShadowLayout:2.1.7'

    // дёӢжӢүеҲ·ж–°пјҢж ёеҝғеә“
    implementation 'com.scwang.smart:refresh-layout-kernel:2.0.3'

    // дёӢжӢүеҲ·ж–°пјҢз»Ҹе…ёеҲ·ж–°еӨҙ
    implementation 'com.scwang.smart:refresh-header-classics:2.0.3'

    //ж ёеҝғжЁЎеқ—
    debugImplementation "io.github.didi.dokit:dokitx:${dokitLastVersion}"

    // debugImplementation because LeakCanary should only run in debug builds.
    debugImplementation 'com.squareup.leakcanary:leakcanary-android:2.9.1'

    // е·Ҙе…·зұ»еә“: https://github.com/Blankj/AndroidUtilCode
    implementation 'com.blankj:utilcodex:1.31.0'

    // жҢҮзӨәеҷЁпјҡhttps://github.com/hackware1993/MagicIndicator
    implementation "com.github.hackware1993:MagicIndicator:1.7.0"

}